# CI gate (ADR-0012): every push and pull request must pass formatting, vet,
# build, and the race-detected test suite before it can merge. The race detector
# is mandatory — it guards the lock-free atomic snapshot the router relies on
# (ADR-0015), where a data race would otherwise pass silently.
name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          check-latest: true

      - name: gofmt
        # Fail if any file is not gofmt-clean. `gofmt -l` lists offending files;
        # a non-empty list means the formatting check failed.
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (race)
        run: go test -race ./...

  release-dryrun:
    # Guard the release pipeline: validate .goreleaser.yaml and build a full set
    # of cross-platform snapshot artifacts on every push/PR, so a broken release
    # config is caught here instead of when a tag is pushed. Nothing is published.
    name: release dry-run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          check-latest: true

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: check

      - name: Build snapshot artifacts
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --snapshot --clean
